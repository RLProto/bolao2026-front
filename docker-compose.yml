
services:
  db:
    image: postgres:16
    container_name: bolao2026_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao2026
      POSTGRES_USER: bolao_user
      POSTGRES_PASSWORD: bolao_password
    ports:
      # host:container
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
