services:
  - type: cron
    name: sync-scores
    runtime: python
    schedule: "* * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -u sync_scores.py
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
